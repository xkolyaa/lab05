language: cpp

script:
- cmake -H. -B_build -DCMAKE_INSTALL_PREFIX=_install -DBUILD_TESTS=ON -DBUILD_TESTS=ON
- cmake --build _build
- cmake --build _build --target install

addons:
  apt:
    sources:
    - george-edison55-precise-backports
    packages:
    - cmake
    - cmake-data
- cmake --build _build --target test -- ARGS=--verbose
- cmake --build _build --target test -- ARGS=--verbose
